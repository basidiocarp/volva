name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-gnu
      - name: Install mingw linker
        run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (Windows cross-check)
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
        run: cargo clippy --all-targets --target x86_64-pc-windows-gnu -- -D warnings

  ci:
    needs: [lint]
    uses: basidiocarp/.github/.github/workflows/rust-ci.yml@1b81c125bdbd08a3454e7fed7446a0e2fee68e26
    with:
      audit: true
